<!DOCTYPE html>
<html>

<head>
<title>Neurosurgery Post-Op Tracker</title>

<style>

body{
font-family:Arial;
margin:20px;
background:#f4f6f9;
font-size:18px;
}

h1{
margin-bottom:10px;
}

input,select,button{
padding:10px;
margin:5px;
font-size:16px;
}

button{
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.remove{
background:#dc3545;
}

.patient{
background:white;
padding:14px;
margin-top:10px;
border-radius:8px;
box-shadow:0px 2px 6px rgba(0,0,0,0.1);
}

.pod{
font-size:24px;
font-weight:bold;
background:#e6f0ff;
padding:4px 10px;
border-radius:6px;
display:inline-block;
margin-top:5px;
}

.dressing{
background:#ffe6e6;
border-left:6px solid red;
}

.suture{
background:#fff3cd;
border-left:6px solid orange;
}

</style>

</head>

<body>

<h1>Neurosurgery Post-Op Tracker</h1>

<h3>Add Patient</h3>

<input id="name" placeholder="Patient Name">

<input type="date" id="surgery">

<select id="drain">
<option value="No">Drain: No</option>
<option value="Yes">Drain: Yes</option>
</select>

<button onclick="addPatient()">Add Patient</button>

<h3>Patient List</h3>

<div id="patientList"></div>


<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBNxTriXNedxNhhKq7LP6gghaxcsY9AM9Q",
authDomain: "neurosurgery-post-op.firebaseapp.com",
databaseURL: "https://neurosurgery-post-op-default-rtdb.firebaseio.com",
projectId: "neurosurgery-post-op",
storageBucket: "neurosurgery-post-op.firebasestorage.app",
messagingSenderId: "7824416406",
appId: "1:7824416406:web:74f30c6196c27616876cb7"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const patientsRef = db.ref("patients");


function calculatePOD(date){

let surgeryDate=new Date(date);
let today=new Date();

surgeryDate.setHours(0,0,0,0);
today.setHours(0,0,0,0);

return Math.floor((today-surgeryDate)/(1000*60*60*24));

}


function addPatient(){

let name=document.getElementById("name").value.trim();
let surgery=document.getElementById("surgery").value;
let drain=document.getElementById("drain").value;

if(name=="" || surgery==""){
alert("Enter patient name and surgery date");
return;
}

patientsRef.push({
name:name,
date:surgery,
drain:drain
})
.then(()=>{
console.log("Patient saved");
})
.catch((error)=>{
alert("Error saving patient. Please try again.");
console.error(error);
});

document.getElementById("name").value="";
document.getElementById("surgery").value="";

}


function removePatient(id){

if(confirm("Discharge this patient?")){
patientsRef.child(id).remove();
}

}


patientsRef.on("value",(snapshot)=>{

let container=document.getElementById("patientList");

container.innerHTML="";

let patients=[];

snapshot.forEach((child)=>{
patients.push({
id:child.key,
...child.val()
});
});

patients.sort((a,b)=>calculatePOD(a.date)-calculatePOD(b.date));

patients.forEach((patient)=>{

let pod=calculatePOD(patient.date);

let div=document.createElement("div");

div.className="patient";

if(pod==2 || pod==4 || pod==6){
div.classList.add("dressing");
}

if(pod>=7){
div.classList.add("suture");
}

div.innerHTML=

"<b>"+patient.name+"</b>"+
"<br><span class='pod'>POD "+pod+"</span>"+
"<br>Surgery Date: "+patient.date+
"<br>Drain: "+patient.drain+
"<br><button class='remove' onclick='removePatient(\""+patient.id+"\")'>Discharge</button>";

container.appendChild(div);

});

});

</script>

</body>
</html>
